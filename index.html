<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0d0d1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kdo me da spat?</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌙</text></svg>">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Fredoka', -apple-system, sans-serif;
      background: #0d0d1a;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body.mami-theme { background: #1a0d16; }

    /* ── App Shell ── */
    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* ── Photo Section ── */
    .photo-section {
      flex: 0 0 42%;
      position: relative;
      overflow: hidden;
    }

    .photo-section img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.7s ease;
    }

    .photo-section img.switching { opacity: 0.3; }

    .photo-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg,
        rgba(0,0,0,0.05) 0%,
        transparent 30%,
        transparent 65%,
        rgba(0,0,0,0.35) 85%,
        rgba(0,0,0,0.85) 100%
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── Name Banner ── */
    .name-banner {
      padding: 16px 24px 12px;
      text-align: center;
      background: #0d0d1a;
      transition: background 0.7s ease, color 0.7s ease;
    }

    body.mami-theme .name-banner { background: #1a0d16; }

    .name-text {
      font-size: clamp(42px, 11vw, 64px);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.5px;
      transition: color 0.7s ease;
    }

    .name-text.tati { color: #8bb9fe; }
    .name-text.mami { color: #f5a8d0; }

    .name-label {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }

    .date-pill {
      position: absolute;
      top: max(12px, env(safe-area-inset-top, 12px));
      right: 12px;
      z-index: 2;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255,255,255,0.7);
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 500;
    }

    /* ── Stars Section ── */
    .stars-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #111122;
      transition: background 0.7s ease;
      position: relative;
      overflow: hidden;
    }

    body.mami-theme .stars-section { background: #22111c; }

    .stars-header {
      padding: 20px 24px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .stars-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .stars-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .stars-count {
      font-size: 18px;
      font-weight: 700;
      color: #fbbf24;
    }

    .streak-chip {
      background: rgba(251,191,36,0.12);
      color: #fbbf24;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 100px;
      letter-spacing: 0.5px;
      display: none;
    }

    .streak-chip.show { display: block; }

    /* ── Star Grid ── */
    .star-grid-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 4px 20px 16px;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    .star-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding: 4px 0;
    }

    .star-card {
      aspect-ratio: 1;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.3s ease;
      padding: 12px;
    }

    .star-card svg {
      width: 58%;
      height: 58%;
      transition: transform 0.3s ease;
      color: rgba(255,255,255,0.06);
    }

    .star-card.earned {
      background: rgba(251,191,36,0.08);
      border-color: rgba(251,191,36,0.2);
    }

    .star-card.earned svg {
      color: #fbbf24;
      filter: drop-shadow(0 0 8px rgba(251,191,36,0.25));
    }

    .star-card.new-star svg {
      animation: starAppear 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes starAppear {
      0% { transform: scale(0) rotate(-45deg); opacity: 0; }
      60% { transform: scale(1.15) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .star-card .star-date {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .star-card.pending {
      background: rgba(255,255,255,0.015);
    }

    .star-card.pending svg path {
      fill: rgba(255,255,255,0.06);
    }

    /* ── Empty State ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 32px 16px;
      color: rgba(255,255,255,0.15);
    }

    .empty-state .empty-icon {
      font-size: 52px;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state .empty-text {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.5;
    }

    /* ── Bottom Bar ── */
    .bottom-bar {
      padding: 14px 20px max(16px, env(safe-area-inset-bottom, 16px));
      background: rgba(17,17,34,0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255,255,255,0.04);
      transition: background 0.7s ease;
    }

    body.mami-theme .bottom-bar { background: rgba(34,17,28,0.98); }

    .collect-btn {
      width: 100%;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      color: #1a1200;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-family: 'Fredoka', sans-serif;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(251,191,36,0.15);
      transition: all 0.2s ease;
    }

    .collect-btn:active {
      transform: scale(0.96);
      box-shadow: 0 2px 10px rgba(251,191,36,0.1);
    }

    .collect-btn:disabled {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.15);
      box-shadow: none;
      cursor: default;
      transform: none;
    }

    .collect-btn .btn-icon {
      width: 22px;
      height: 22px;
    }

    .star-counter .big-star {
      width: 36px;
      height: 36px;
      color: #fbbf24;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      color: #fbbf24;
      padding: 24px 36px;
      border-radius: 24px;
      font-size: 20px;
      font-weight: 700;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-align: center;
      border: 1px solid rgba(251,191,36,0.1);
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .toast-emoji { font-size: 48px; display: block; margin-bottom: 6px; }

    /* ── Confetti ── */
    .confetti-piece {
      position: fixed;
      z-index: 999;
      pointer-events: none;
    }

    /* ── Install Banner ── */
    .install-banner {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1e293b;
      color: white;
      text-align: center;
      padding: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      z-index: 50;
      display: none;
    }
    .install-banner.show { display: block; }
  </style>
</head>
<body>

  <svg style="position:absolute;width:0;height:0" xmlns="http://www.w3.org/2000/svg">
    <symbol id="star" viewBox="0 0 24 24">
      <path fill="currentColor" d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6.4-4.8-6.4 4.8 2.4-7.2-6-4.8h7.6z"/>
    </symbol>
  </svg>

  <div class="app">
    <!-- Photo -->
    <div class="photo-section">
      <img id="personImage" src="" alt="">
      <div class="photo-gradient"></div>
      <div class="date-pill" id="datePill"></div>
    </div>

    <!-- Name -->
    <div class="name-banner">
      <div class="name-text" id="nameText"></div>
      <div class="name-label">gre danes spat</div>
    </div>

    <!-- Stars -->
    <div class="stars-section">
      <div class="stars-header">
        <span class="stars-title">Zvezdice</span>
        <div class="stars-meta">
          <span class="streak-chip" id="streakChip">🔥 0</span>
          <span class="stars-count" id="starsTotal">0</span>
        </div>
      </div>

      <div class="star-grid-scroll" id="starScroll">
        <div class="star-grid" id="starGrid"></div>
      </div>

      <div class="bottom-bar">
        <button class="collect-btn" id="collectBtn">
          <svg class="btn-icon"><use href="#star" fill="currentColor"/></svg>
          Zvezdica!
        </button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="install-banner" id="installBanner" onclick="installApp()">
    📲 Namesti aplikacijo na telefon
  </div>

  <script>
    const REF = { date: '2026-07-13', isTati: true };
    const GRID_COLS = 3;
    const images = { tati: 'tati.jpg', mami: 'mami.jpg' };
    let deferredPrompt = null;

    // ── State ──
    function whoseTurn() {
      const t = new Date().toISOString().split('T')[0];
      const d = Math.floor((new Date(t) - new Date(REF.date)) / 86400000);
      return ((d % 2 === 0) === REF.isTati) ? 'tati' : 'mami';
    }

    function loadDates() {
      try { return JSON.parse(localStorage.getItem('spalnica_star_dates') || '[]'); }
      catch { return []; }
    }

    function saveDates(d) { localStorage.setItem('spalnica_star_dates', JSON.stringify(d)); }

    function canCollect() {
      return !loadDates().includes(new Date().toISOString().split('T')[0]);
    }

    function addStar() {
      if (!canCollect()) return false;
      const dates = loadDates();
      dates.push(new Date().toISOString().split('T')[0]);
      saveDates(dates);
      return true;
    }

    function getStreak() {
      const dates = loadDates().sort().reverse();
      if (!dates.length) return 0;
      const today = new Date().toISOString().split('T')[0];
      let s = 0;
      const c = new Date(today + 'T00:00:00');
      if (!dates.includes(today)) c.setDate(c.getDate() - 1);
      while (dates.includes(c.toISOString().split('T')[0])) { s++; c.setDate(c.getDate() - 1); }
      return s;
    }

    // ── Render ──
    function render() {
      const turn = whoseTurn();
      const dates = loadDates();
      const streak = getStreak();
      const collected = !canCollect();

      // Theme
      document.body.className = turn === 'mami' ? 'mami-theme' : '';

      // Photo
      const img = document.getElementById('personImage');
      if (img.dataset.current !== turn) {
        img.classList.add('switching');
        setTimeout(() => {
          img.src = images[turn];
          img.classList.remove('switching');
          img.dataset.current = turn;
        }, 350);
      } else if (!img.src.includes(images[turn])) {
        img.src = images[turn];
        img.dataset.current = turn;
      }

      // Name
      const n = document.getElementById('nameText');
      n.className = 'name-text ' + turn;
      n.textContent = turn === 'tati' ? 'Tati' : 'Mami';

      // Date pill
      const days = ['Nedelja','Ponedeljek','Torek','Sreda','Četrtek','Petek','Sobota'];
      const mos = ['jan','feb','mar','apr','maj','jun','jul','avg','sep','okt','nov','dec'];
      const d = new Date();
      document.getElementById('datePill').textContent =
        days[d.getDay()] + ', ' + d.getDate() + '. ' + mos[d.getMonth()] + '.';

      // Star grid
      const grid = document.getElementById('starGrid');
      const totalSlots = Math.max(dates.length + 3, 8); // Show at least 8 slots, +3 preview
      const rounded = Math.ceil(totalSlots / GRID_COLS) * GRID_COLS;

      let html = '';
      for (let i = 0; i < rounded; i++) {
        const earned = i < dates.length;
        const cls = earned ? 'star-card earned' : 'star-card pending';
        const dateLabel = earned
          ? dates[i].slice(5).replace('-', '/')
          : '';
        html += '<div class="' + cls + '">' +
          '<svg><use href="#star" fill="' + (earned ? '#fbbf24' : 'rgba(255,255,255,0.06)') + '"/></svg>' +
          (dateLabel ? '<span class="star-date">' + dateLabel + '</span>' : '') +
          '</div>';
      }

      if (dates.length === 0) {
        html = '<div class="empty-state">' +
          '<div class="empty-icon">🌙</div>' +
          '<div class="empty-text">Še nobene zvezdice.<br>Pojdi lepo spat in pritisni gumb!</div>' +
          '</div>';
      }

      grid.innerHTML = html;

      // Mark newest star for animation
      if (dates.length > 0 && window._justCollected) {
        const cards = grid.querySelectorAll('.star-card.earned');
        if (cards.length) cards[cards.length - 1].classList.add('new-star');
        window._justCollected = false;
      }

      // Header
      document.getElementById('starsTotal').textContent = dates.length;

      const sc = document.getElementById('streakChip');
      if (streak >= 3) {
        sc.classList.add('show');
        sc.textContent = '🔥 ' + streak;
      } else {
        sc.classList.remove('show');
      }

      // Button
      const btn = document.getElementById('collectBtn');
      if (collected) {
        btn.disabled = true;
        btn.innerHTML = '<span style="font-size:18px">✓</span> Že zbrana';
      } else {
        btn.disabled = false;
        btn.innerHTML = '<svg class="btn-icon"><use href="#star" fill="currentColor"/></svg> Zvezdica!';
      }

      // Meta theme
      document.querySelector('meta[name="theme-color"]').content =
        turn === 'tati' ? '#0d0d1a' : '#1a0d16';
    }

    // ── Collect ──
    function doCollect() {
      if (!addStar()) return;
      window._justCollected = true;
      render();

      // Scroll to new star
      const scroll = document.getElementById('starScroll');
      setTimeout(() => scroll.scrollTop = scroll.scrollHeight, 200);

      // Confetti
      spawnConfetti();

      // Toast
      const streak = getStreak();
      if (streak >= 7) showToast('👑', 'Cel teden! Kralj zvezdic!');
      else {
        const m = [
          ['🌟','Bravo! Zvezdica je tvoja!'],
          ['🎉','Odlično! Kar tako naprej!'],
          ['💫','Super! Si pravi zvezdni junak!'],
          ['✨','Čestitke! Nova zvezdica!'],
          ['🏆','Fenomenalno! Zvezde se nabirajo!']
        ][Math.floor(Math.random() * 5)];
        showToast(m[0], m[1]);
      }
    }

    document.getElementById('collectBtn').addEventListener('click', doCollect);

    // ── Confetti ──
    function spawnConfetti() {
      const colors = ['#fbbf24','#f59e0b','#fcd34d','#60a5fa','#f472b6','#34d399','#a78bfa','#fff'];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const el = document.createElement('div');
          el.className = 'confetti-piece';
          const s = 6 + Math.random() * 12;
          el.style.cssText = [
            'top:-20px','left:'+Math.random()*100+'%',
            'width:'+s+'px','height:'+s+'px',
            'background:'+colors[~~(Math.random()*colors.length)],
            'border-radius:'+(Math.random()>.5?'50%':'2px'),
            'animation:cf '+(2+Math.random()*3)+'s ease-in '+(Math.random()*.5)+'s forwards',
            'transform:rotate('+(Math.random()*360)+'deg)'
          ].join(';');
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 4000);
        }, i * 20);
      }
    }

    // ── Toast ──
    function showToast(emoji, text) {
      const t = document.getElementById('toast');
      t.innerHTML = '<span class="toast-emoji">'+emoji+'</span>'+text;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2400);
    }

    // ── PWA ──
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      const b = document.getElementById('installBanner');
      b.classList.add('show');
      setTimeout(() => b.classList.remove('show'), 5000);
    });

    window.installApp = () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(r => {
        if (r.outcome === 'accepted') document.getElementById('installBanner').classList.remove('show');
        deferredPrompt = null;
      });
    };

    // ── Midnight ──
    function scheduleMidnight() {
      const n = new Date();
      const m = new Date(n.getFullYear(), n.getMonth(), n.getDate() + 1);
      setTimeout(() => { render(); scheduleMidnight(); }, m - n + 500);
    }

    // ── Init ──
    render();
    scheduleMidnight();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

    const ss = document.createElement('style');
    ss.textContent = '@keyframes cf{0%{transform:translateY(0) rotate(0) scale(1);opacity:1}70%{opacity:1}100%{transform:translateY(105vh) rotate(720deg) scale(.3);opacity:0}}';
    document.head.appendChild(ss);
  </script>
</body>
</html>
